<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Request Headers</title>
</head>
<body>
<h1>Request Headers</h1>
<ul>
    <li th:each="header : ${headers}">
        <strong th:text="${header.key}">Header</strong>: <span th:text="${header.value}">Value</span>
    </li>
</ul>
</body>
</html>
